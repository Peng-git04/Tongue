<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tongue — HN Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
   :root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e0e0e0;
  --accent: #b22222;
  --text: #111111;
  --muted: #555555;
  --serif: 'Playfair Display', serif;
  --sans: 'IBM Plex Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  line-height: 1.6;
}

header {
  border-bottom: 1px solid var(--border);
  padding: 2rem 2rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

header h1 {
  font-family: var(--serif);
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--text);
}

header h1 span { color: var(--accent); }

header p {
  font-size: 0.85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

#news-list { list-style: none; }

.news-item {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 0;
  transition: background 0.2s ease;
}

.news-item:last-child { border-bottom: none; }

.news-title a {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s, text-decoration 0.2s;
}

.news-title a:hover {
  color: var(--accent);
  text-decoration: underline;
}

.news-meta {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 0.4rem;
  display: flex;
  gap: 1rem;
  font-family: var(--sans);
}

.news-meta .date::before { content: '📅 '; }
.news-meta .domain::before { content: '🔗 '; }

#load-more-container { text-align: center; margin: 2rem 0; }

#load-more-btn {
  background-color: var(--accent);
  color: #ffffff;
  border: 1px solid var(--accent);
  padding: 0.6rem 2rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}

#load-more-btn:hover:not(:disabled) {
  background-color: #8b1a1a;
  border-color: #8b1a1a;
}

#load-more-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#error-msg {
  display: none;
  background: #ffecec;
  border: 1px solid #ffcccc;
  color: #b22222;
  padding: 1rem;
  border-radius: 4px;
  font-family: var(--sans);
  font-size: 0.85rem;
  margin-bottom: 1rem;
}

#status-bar {
  font-family: var(--sans);
  font-size: 0.8rem;
  color: var(--muted);
  text-align: center;
  padding: 1rem 0 2rem;
}
  </style>
  <script type="module" crossorigin src="/assets/index-B99heJEI.js"></script>
</head>
<body>
  <header>
    <h1>Ton<span>gue</span></h1>
    <p>Hacker News Reader </p>
  </header>
  <main>
    <div id="error-msg"></div>
    <ul id="news-list"></ul>
    <div id="load-more-container">
      <button id="load-more-btn" disabled>Load more</button>
    </div>
    <div id="status-bar"></div>
  </main>
</body>
</html>
